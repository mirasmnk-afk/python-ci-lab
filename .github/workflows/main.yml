name: Python CI (Lab 13)

# Кодты push жасаған сайын автоматты түрде іске қосылады
on: [push, pull_request]

jobs:
  build:
    # Тесттерді орындау үшін Ubuntu серверін қолданамыз
    runs-on: ubuntu-latest

    steps:
    # 1. GitHub репозиторийіндегі кодты виртуалды машинаға жүктеп алу
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Python-ды орнату
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. Қажетті кітапханаларды (pytest) орнату
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Тесттерді іске қосу (13-зертханалық жұмыстың негізгі тапсырмасы)
    - name: Run tests with pytest
      run: pytest
